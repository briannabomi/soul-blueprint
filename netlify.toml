[build]
  publish = "."
  functions = "netlify/functions"

[context.production]
  environment = { NODE_VERSION = "18" }

# SPA-style fallback not needed — this is a single static page.
# If you add client-side routing later, uncomment:
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]
